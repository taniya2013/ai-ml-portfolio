<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Scraper | Galaxy Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            margin: 0; 
            background-color: #030008; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
        }
        
        .pink-gradient-text { 
            background: linear-gradient(90deg, #ff7eb3 0%, #ff1493 50%, #ff758c 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .nav-container { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            padding: 20px; 
            z-index: 20; 
            position: sticky; 
            top: 0; 
            background: rgba(3, 0, 8, 0.5); 
            backdrop-filter: blur(10px); 
        }
        
        .glow-button { 
            background: rgba(255, 20, 147, 0.05); 
            border: 2px solid #ff7eb3; 
            color: #ff7eb3; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        .glow-button:hover { 
            background: #ff7eb3; 
            color: #fff; 
            box-shadow: 0 0 15px #ff7eb3; 
            transform: translateY(-2px); 
        }
        
        .table-container { 
            padding: 50px 8%; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: rgba(20, 5, 25, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 126, 179, 0.2); 
            border-radius: 1.5rem; 
            overflow: hidden; 
        }
        
        th, td { 
            padding: 20px; 
            text-align: left; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            color: #e2e8f0; 
        }
        
        th { 
            background: rgba(255, 20, 147, 0.2); 
            color: #fff; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        tr:hover { 
            background: rgba(255, 20, 147, 0.1); 
        }
        
        .title { 
            font-weight: 500; 
        }
        
        .action-btn { 
            color: #ff7eb3; 
            text-decoration: none; 
            font-weight: bold; 
            padding: 5px 15px; 
            border: 1px solid #ff7eb3; 
            border-radius: 5px; 
            transition: 0.3s; 
            display: inline-block;
        }
        
        .action-btn:hover { 
            background: #ff7eb3; 
            color: white; 
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <nav class="nav-container">
        <button class="glow-button" onclick="window.location.href='/'">Home</button>
        <button class="glow-button" onclick="window.location.reload()">Refresh</button>
    </nav>

    <main class="table-container">
        <h1 class="text-5xl font-extrabold mb-10 text-center pink-gradient-text">🍽️ Zomato Restaurants Data</h1>
        
        <table>
            <thead>
                <tr>
                    <th>Sr No</th>
                    <th>Restaurant Name</th>
                    <th>Rating (⭐)</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <!-- 
                    JINJA2 TEMPLATE INSTRUCTION:
                    Backend ke liye ye loop use karein:

                    {% for item in data %}
                    <tr>
                        <td class="text-pink-400 font-bold w-20">{{ loop.index }}</td>
                        <td class="title">{{ item.name }}</td>
                        <td class="text-yellow-400 font-bold">{{ item.rating }}</td>
                        <td>
                            <a href="{{ item.link }}" target="_blank" class="action-btn">View Page</a>
                        </td>
                    </tr>
                    {% endfor %}
                -->
            </tbody>
        </table>
    </main>

    <script>
        // --- 1. Galaxy Canvas Animation ---
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight; 
            stars = Array.from({length: 400}, () => ({
                x: Math.random() * width, 
                y: Math.random() * height, 
                size: Math.random() * 1.5, 
                speed: Math.random() * 0.5
            })); 
        }
        
        function animate() { 
            ctx.fillStyle = '#030008'; 
            ctx.fillRect(0, 0, width, height); 
            ctx.fillStyle = 'white'; 
            
            stars.forEach(s => { 
                s.y += s.speed; 
                if (s.y > height) s.y = 0; 
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); 
                ctx.fill(); 
            }); 
            
            requestAnimationFrame(animate); 
        }
        
        window.onresize = resize; 
        
        // --- 2. Mock Data Rendering (Preview Purpose Only) ---
        const mockScrapedData = [
            { name: "The Big Chill Cafe", rating: "4.8", link: "#" },
            { name: "Barbeque Nation", rating: "4.5", link: "#" },
            { name: "Diggin", rating: "4.3", link: "#" },
            { name: "Social", rating: "4.4", link: "#" },
            { name: "Burger King", rating: "4.1", link: "#" },
            { name: "Domino's Pizza", rating: "4.2", link: "#" },
            { name: "KFC - Kentucky Fried Chicken", rating: "3.9", link: "#" }
        ];

        window.onload = function() {
            // Start Canvas
            resize(); 
            animate();

            // Load Data
            const tbody = document.getElementById('data-table-body');
            mockScrapedData.forEach((item, index) => {
                const rowHTML = `
                    <tr>
                        <td class="text-pink-400 font-bold w-20">${index + 1}</td>
                        <td class="title">${item.name}</td>
                        <td class="text-yellow-400 font-bold">${item.rating}</td>
                        <td>
                            <a href="${item.link}" class="action-btn">View Page</a>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', rowHTML);
            });
        };
    </script>
</body>
</html>
