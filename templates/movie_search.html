<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App | Galaxy Theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            margin: 0; 
            background-color: #030008; 
            color: white; 
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        canvas { 
            display: block; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: -1; 
        }
        
        .pink-gradient-text { 
            background: linear-gradient(90deg, #ff7eb3 0%, #ff1493 50%, #ff758c 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .nav-container { 
            display: flex; 
            justify-content: flex-end; 
            gap: 15px; 
            padding: 20px; 
            z-index: 20; 
            position: sticky; 
            top: 0; 
            background: rgba(3, 0, 8, 0.5); 
            backdrop-filter: blur(10px); 
        }
        
        .glow-button { 
            background: rgba(255, 20, 147, 0.05); 
            border: 2px solid #ff7eb3; 
            color: #ff7eb3; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        
        .glow-button:hover { 
            background: #ff7eb3; 
            color: #fff; 
            box-shadow: 0 0 15px #ff7eb3; 
            transform: translateY(-2px); 
        }

        /* Search Form Styles */
        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0 40px 0;
            flex-wrap: wrap;
        }

        .glow-input {
            padding: 12px 20px;
            width: 300px;
            max-width: 100%;
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(255, 126, 179, 0.4);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .glow-input:focus {
            border-color: #ff7eb3;
            box-shadow: 0 0 15px rgba(255, 126, 179, 0.3);
        }
        
        /* Table Styles */
        .table-container { 
            padding: 0 5% 50px 5%; 
            max-width: 1200px;
            margin: auto;
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: rgba(20, 5, 25, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 126, 179, 0.2); 
            border-radius: 15px; 
            overflow: hidden; 
        }
        
        th, td { 
            padding: 16px 20px; 
            text-align: left; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            color: #e2e8f0; 
        }
        
        th { 
            background: rgba(255, 20, 147, 0.2); 
            color: #fff; 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        tr:hover { 
            background: rgba(255, 20, 147, 0.1); 
        }
        
        .title { 
            font-weight: 500; 
            color: #f8fafc;
        }

        .badge {
            background: rgba(255, 126, 179, 0.15);
            color: #ff7eb3;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(255, 126, 179, 0.3);
        }
        
        .imdb-link { 
            color: #ff7eb3; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
        }
        
        .imdb-link:hover { 
            text-decoration: underline; 
            text-shadow: 0 0 8px #ff7eb3;
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <nav class="nav-container">
        <button class="glow-button" onclick="window.location.href='/'">Home</button>
    </nav>

    <main>
        <h1 class="text-4xl md:text-5xl font-extrabold mt-10 text-center pink-gradient-text tracking-wide">🎬 Movie Search App</h1>
        
        <form method="POST" class="search-container">
            <input type="text" name="movie" class="glow-input" placeholder="Enter movie name (e.g. Batman)" required>
            <button type="submit" class="glow-button px-8">Search</button>
        </form>

        <div class="table-container">
            {% if movies %}
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Year</th>
                        <th>Type</th>
                        <th>IMDB ID</th>
                    </tr>
                </thead>
                <tbody>
                    {% for movie in movies %}
                    <tr>
                        <td class="title font-bold text-lg">{{ movie.Title }}</td>
                        <td class="text-pink-200">{{ movie.Year }}</td>
                        <td><span class="badge">{{ movie.Type }}</span></td>
                        <td>
                            <a href="https://www.imdb.com/title/{{ movie.imdbID }}" target="_blank" class="imdb-link">{{ movie.imdbID }}</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% endif %}
        </div>
    </main>

    <script>
        // --- 1. Galaxy Canvas Animation ---
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = canvas.width = window.innerWidth; 
            height = canvas.height = window.innerHeight; 
            stars = Array.from({length: 400}, () => ({
                x: Math.random() * width, 
                y: Math.random() * height, 
                size: Math.random() * 1.5, 
                speed: Math.random() * 0.5
            })); 
        }
        
        function animate() { 
            ctx.fillStyle = '#030008'; 
            ctx.fillRect(0, 0, width, height); 
            ctx.fillStyle = 'white'; 
            
            stars.forEach(s => { 
                s.y += s.speed; 
                if (s.y > height) s.y = 0; 
                ctx.beginPath(); 
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); 
                ctx.fill(); 
            }); 
            
            requestAnimationFrame(animate); 
        }
        
        window.onresize = resize; 
        
        window.onload = function() {
            // Start Canvas
            resize(); 
            animate();
        };
    </script>
</body>
</html>
