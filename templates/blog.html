<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace - Blogs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #030008; color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: -1; }
        
        .pink-gradient-text { background: linear-gradient(90deg, #ff7eb3 0%, #ff1493 50%, #ff758c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-container { display: flex; justify-content: flex-end; gap: 10px; padding: 20px; z-index: 20; position: sticky; top: 0; }
        
        .glow-button { background: rgba(255, 20, 147, 0.05); border: 2px solid #ff7eb3; color: #ff7eb3; transition: all 0.3s ease; cursor: pointer; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-transform: uppercase; }
        .glow-button:hover { background: #ff7eb3; color: #fff; box-shadow: 0 0 15px #ff7eb3; transform: translateY(-2px); }
        
        /* Glass Panel with Hover Glow */
        .glass-panel { 
            background: rgba(20, 5, 25, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 126, 179, 0.2);
            transition: all 0.4s ease;
        }
        .glass-panel:hover {
            border-color: #ff7eb3;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <canvas id="galaxyCanvas"></canvas>

    <nav class="nav-container">
        <button class="glow-button" onclick="window.location.href='/'">Home</button>
        <button class="glow-button" onclick="window.location.href='/about'">About Me</button>
    </nav>

    <main class="p-6 max-w-4xl mx-auto space-y-12">
        <section class="text-center py-10">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 pink-gradient-text">My Research Blogs</h1>
            <p class="text-gray-400">Insights and analysis on modern AI technologies.</p>
        </section>

        <!-- Blog Post: Microsoft Copilot -->
        <section class="glass-panel p-8 rounded-3xl flex flex-col md:flex-row items-center gap-8">
            <div class="w-full md:w-1/3 h-48 bg-pink-900/20 rounded-2xl flex items-center justify-center border border-pink-500/30">
                <span class="text-6xl">📄</span>
            </div>
            <div class="w-full md:w-2/3">
                <h2 class="text-3xl font-bold text-white mb-4">Microsoft Copilot Analysis</h2>
                <p class="text-gray-300 mb-6 leading-relaxed">
                    A comprehensive look at how Microsoft Copilot is revolutionizing productivity through generative AI integration in the workplace.
                </p>
                <!-- Replace 'path/to/your/copilot.pdf' with your actual file path -->
               <button
onclick="window.open('{{ url_for('static', filename='pdf/BLOG.pdf') }}', '_blank')"
class="glow-button">
    Open PDF Blog
</button>
            </div>
        </section>
    </main>

    <script>
        // Galaxy Canvas Logic
        const canvas = document.getElementById('galaxyCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; stars = Array.from({length: 300}, () => ({x: Math.random() * width, y: Math.random() * height, size: Math.random() * 1.5, speed: Math.random() * 0.5})); }
        function animate() { ctx.fillStyle = '#030008'; ctx.fillRect(0, 0, width, height); ctx.fillStyle = 'white'; stars.forEach(s => { s.y += s.speed; if (s.y > height) s.y = 0; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(animate); }
        window.onresize = resize; resize(); animate();
    </script>
</body>
</html>
